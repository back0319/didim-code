
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
    networks:
      - app-network
      
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-container
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=dldnfud0789@naver.com
      - PGADMIN_DEFAULT_PASSWORD=dldnfud012

networks:
  app-network:
    driver: bridge